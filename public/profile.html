<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Profile — Strangr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="social.css"/>
</head>
<body class="profile-page-body">

<!-- Toast (reuses existing style) -->
<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

<!-- ── NAV ── -->
<nav class="nav" id="mainNav">
  <div class="nav-inner">
    <a class="nav-logo" href="/">Strangr</a>
    <div class="nav-right" id="profileNavRight">
      <!-- Auth widget injected by auth.js -->
    </div>
  </div>
</nav>

<!-- ── PROFILE CONTENT ── -->
<div class="profile-page" id="profilePage">

  <!-- Loading state -->
  <div class="profile-loading" id="profileLoading">
    <div class="profile-loading-spinner"></div>
    <span>Loading profile…</span>
  </div>

  <!-- Not logged in gate -->
  <div class="profile-gate hidden" id="profileGate">
    <div class="gate-icon">🔒</div>
    <h2 class="gate-title">Sign in to view your profile</h2>
    <p class="gate-sub">Create an account or sign in to set up your profile.</p>
    <button class="gate-btn" id="gateSignInBtn">Sign in / Create account</button>
  </div>

  <!-- Actual profile card -->
  <div class="profile-card hidden" id="profileCard">

    <!-- Cover area -->
    <div class="profile-cover" id="profileCover">
      <div class="profile-cover-gradient"></div>
    </div>

    <!-- Avatar + edit button -->
    <div class="profile-avatar-row">
      <div class="profile-avatar-wrap" id="profileAvatarWrap">
        <div class="profile-avatar" id="profileAvatar">
          <!-- initials or img -->
        </div>
        <!-- Avatar upload trigger (edit mode only) -->
        <button class="profile-avatar-edit hidden" id="btnChangeAvatar" title="Change avatar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </button>
        <input type="file" id="avatarFileInput" accept="image/png,image/jpeg,image/webp" hidden/>
      </div>
      <div class="profile-actions-row">
        <button class="profile-edit-btn" id="btnEditProfile">Edit profile</button>
        <button class="profile-save-btn hidden" id="btnSaveProfile">
          <span id="saveBtnText">Save changes</span>
          <span class="auth-spinner hidden" id="saveSpinner"></span>
        </button>
        <button class="profile-cancel-btn hidden" id="btnCancelEdit">Cancel</button>
      </div>
    </div>

    <!-- Profile info (view mode) -->
    <div class="profile-info" id="profileInfoView">
      <h1 class="profile-display-name" id="viewDisplayName"></h1>
      <p class="profile-username" id="viewUsername"></p>
      <p class="profile-bio" id="viewBio"></p>
      <p class="profile-joined" id="viewJoined"></p>
    </div>

    <!-- Profile info (edit mode) -->
    <div class="profile-info hidden" id="profileInfoEdit">
      <div class="profile-edit-form">

        <div class="pef-field">
          <label class="pef-label" for="editDisplayName">Display name</label>
          <input class="pef-input" id="editDisplayName" type="text"
                 maxlength="40" placeholder="How you appear to others"/>
        </div>

        <div class="pef-field">
          <label class="pef-label" for="editUsername">Username</label>
          <div class="pef-input-wrap">
            <span class="pef-prefix">@</span>
            <input class="pef-input pef-with-prefix" id="editUsername" type="text"
                   maxlength="20" placeholder="yourhandle"
                   pattern="[a-z0-9_]{3,20}"/>
          </div>
          <div class="pef-hint">3–20 chars: letters, numbers, underscore</div>
        </div>

        <div class="pef-field">
          <label class="pef-label" for="editBio">Bio</label>
          <textarea class="pef-input pef-textarea" id="editBio"
                    maxlength="160" rows="3"
                    placeholder="Tell people a little about yourself…"></textarea>
          <div class="pef-count"><span id="bioCharCount">0</span> / 160</div>
        </div>

        <div class="pef-error hidden" id="profileEditError"></div>

      </div>
    </div>

    <!-- Stats row -->
    <div class="profile-stats" id="profileStats">
      <div class="ps-item">
        <span class="ps-num" id="statFriends">0</span>
        <span class="ps-lbl">Friends</span>
      </div>
      <div class="ps-divider"></div>
      <div class="ps-item">
        <span class="ps-num" id="statMemberSince"></span>
        <span class="ps-lbl">Member since</span>
      </div>
    </div>

  </div><!-- end profile-card -->

</div><!-- end profile-page -->

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
<script src="supabase_client.js" defer></script>
<script src="auth.js" defer></script>
<script src="profile.js" defer></script>
</body>
</html>
