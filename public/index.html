<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strangr — talk to a stranger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated background grid -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <div class="app">

    <!-- ── Header ── -->
    <header class="header">
      <div class="logo">
        <span class="logo-s">S</span>trangr
        <span class="logo-dot">.</span>
      </div>
      <div class="header-right">
        <div class="live-badge">
          <span class="pulse-dot"></span>
          <span id="onlineCount">—</span> online
        </div>
      </div>
    </header>

    <!-- ── Main chat area ── -->
    <main class="chat-wrap">

      <!-- Status bar -->
      <div class="status-bar">
        <div id="statusDot" class="status-dot waiting"></div>
        <span id="statusText">Finding a stranger…</span>
      </div>

      <!-- Messages -->
      <div class="messages" id="messages" role="log" aria-live="polite" aria-label="Chat messages">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">⚡</div>
          <p>You'll be connected to a random stranger.<br/>Say hi and be kind.</p>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-row">
          <textarea
            id="messageInput"
            class="message-input"
            placeholder="Type a message…"
            rows="1"
            maxlength="500"
            disabled
            aria-label="Message input"
          ></textarea>
          <button id="sendBtn" class="btn btn-send" disabled aria-label="Send message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <div class="action-row">
          <span class="char-count" id="charCount">0 / 500</span>
          <button id="skipBtn" class="btn btn-skip">
            Next stranger →
          </button>
        </div>
      </div>

    </main>

    <footer class="footer">
      Anonymous. Ephemeral. No logs, no accounts.
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
